<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <meta property="og:title" content="{{ page.title }} — {{ site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="article" />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/jhl-labs/jvim-public/main/jvm_demo_compact.gif"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2316181d'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='ui-monospace,monospace' font-size='32' font-weight='700' fill='%2356d1f5'%3Ej%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  </head>
  <body>
    {% include nav.html %}

    <main class="prose-wrapper">
      <article class="prose">
        <div class="page-header">
          <div class="page-crumb"><a href="{{ '/' | relative_url }}">jvim</a> /  docs</div>
          {% if page.title %}<h1>{{ page.title }}</h1>{% endif %}
        </div>
        {{ content }}
      </article>
    </main>

    {% include footer.html %}
  </body>
</html>
