# GitHub Pages / Jekyll config for the jvim project site.
# Serves everything under this /docs folder as a static site.
#
# To enable: Repo Settings → Pages → Source: "Deploy from a branch"
#            → Branch: main, Folder: /docs

title: jvim
description: AI-native TUI markdown workspace — vim-fast, Notepad-ergonomic.
url: https://jhl-labs.github.io
baseurl: /jvim-public

# Release metadata — bumped per release (see source repo
# docs/ops/npm-release.md §4 step "Update docs site version"). All
# version-specific strings in index.html / install.md reference
# {{ site.version }} so a release only needs to edit this file.
version: "0.1.3"
release_date: "2026-04-15"

# We provide our own layout; don't pull in a default theme.
theme: null

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: text

# Don't ship these into the generated site.
exclude:
  - README.md
  - CNAME.example

# Consistent, human-readable URLs: /install instead of /install.html
permalink: /:basename/

# Prose defaults — applied via front-matter `layout: page`.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
